<style>

<body class="industrial-bg text-on-surface font-body-lg min-h-screen flex flex-col relative overflow-hidden">
<!-- Ambient background element for technical feel -->
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none" style="background-image: linear-gradient(#2D4263 1px, transparent 1px), linear-gradient(90deg, #2D4263 1px, transparent 1px); background-size: 32px 32px;"></div>
<!-- TopNavBar (Shared Component Execution - Adjusted for intent) -->
<!-- Suppressed navigation shell intent logic: This is a transactional login page. The JSON TopNavBar normally shows "Home". 
         We are instructed to execute the JSON styles, but the UX Goal states: "Automatic Suppression: You MUST exclude the navigation shell if the page intent is Linear/Transactional: Login".
         However, the user prompt specifically requested: "Fixed Top Navbar: Brand logo 'SolydShop' in primary blue (#8ed5ff), 'Home' link, and a ghost-style 'Register' button on the right."
         I will follow the user's specific component request while applying the JSON styles where possible, treating it as a specialized header for this flow.
    -->
<nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-gutter h-16 bg-background/95 backdrop-blur-sm border-b border-outline-variant shadow-sm">
<div class="flex items-center gap-stack-lg">
<span class="font-headline-md text-headline-md font-bold text-primary-container">SolydShop</span>
<div class="hidden md:flex gap-stack-md ml-stack-lg">
<!-- Navigation is basically disabled for login, but prompt asked for 'Home' link -->
<a class="text-on-surface-variant font-label-caps text-label-caps hover:text-primary-container transition-colors duration-200 py-2" href="#">Home</a>
</div>
</div>
<div class="flex items-center gap-stack-md">
<!-- Ghost style 'Register' button based on user prompt -->
<button class="px-4 py-2 border border-[#2D4263] rounded text-on-surface font-label-caps text-label-caps hover:bg-surface-container-high transition-colors">Register</button>
</div>
</nav>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center relative z-10 px-gutter pt-16">
<!-- Centered Auth Card -->
<div class="w-full max-w-[420px] industrial-card border rounded-lg p-stack-lg shadow-[0_4px_20px_rgba(0,0,0,0.4)]">
<div class="mb-stack-lg text-center">
<h1 class="font-headline-lg text-headline-lg text-primary-container mb-stack-xs">Welcome Back</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to your SolydShop account</p>
</div>
<form class="space-y-stack-md">
<!-- Email Field -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-stack-xs" for="email">Email Address</label>
<input class="w-full industrial-input border rounded px-3 py-2 font-body-sm text-body-sm text-on-surface placeholder-outline transition-colors" id="email" placeholder="user@company.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-stack-xs">
<label class="block font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary-container hover:text-secondary-fixed transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full industrial-input border rounded px-3 py-2 pr-10 font-body-sm text-body-sm text-on-surface placeholder-outline transition-colors" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">visibility</span>
</button>
</div>
</div>
<!-- Sign In CTA -->
<button class="w-full btn-primary rounded font-label-caps text-label-caps py-3 mt-stack-md transition-colors flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-stack-lg">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-3 font-label-caps text-label-caps text-on-surface-variant">or</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Register Link -->
<div class="text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary-container font-semibold hover:text-secondary-fixed transition-colors" href="#">Register</a>
</p>
</div>
</div>
</main>
<script>
        // Simple password toggle logic for the eye icon
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.querySelector('button[type="button"]');
            const passInput = document.getElementById('password');
            const iconSpan = toggleBtn.querySelector('.material-symbols-outlined');

            toggleBtn.addEventListener('click', () => {
                if (passInput.type === 'password') {
                    passInput.type = 'text';
                    iconSpan.textContent = 'visibility_off';
                } else {
                    passInput.type = 'password';
                    iconSpan.textContent = 'visibility';
                }
            });
        });
    </script>
